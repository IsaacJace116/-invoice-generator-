<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <meta name="google-site-verification" content="jlfAq0_n89lNQgjw_YRyJ282xY3OrUEt8mG0e6Wi27E" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            align-items: end;
        }

        .row input {
            margin-bottom: 0;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-add {
            background: #667eea;
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 20px;
        }

        .btn-remove {
            background: #e94560;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .invoice-preview {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .invoice-preview.show {
            display: block;
        }

        .invoice-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }

        .invoice-header h2 {
            font-size: 24px;
            color: #333;
            border: none;
        }

        .invoice-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .invoice-details p {
            color: #555;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .invoice-details strong {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        .totals {
            text-align: right;
            margin-top: 20px;
        }

        .totals p {
            font-size: 16px;
            margin-bottom: 5px;
            color: #555;
        }

        .totals .grand-total {
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }

        .share-btn {
            background: #28a745;
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧾 Invoice Generator</h1>
            <p>Create professional invoices in seconds</p>
        </div>

        <div class="card">
            <h2>Business Info</h2>
            <div class="form-group">
                <label>Your Business Name</label>
                <input type="text" id="businessName" placeholder="e.g. ABC Services">
            </div>
            <div class="form-group">
                <label>Your Email</label>
                <input type="email" id="businessEmail" placeholder="you@business.com">
            </div>
        </div>

        <div class="card">
            <h2>Client Info</h2>
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" id="clientName" placeholder="e.g. John Smith">
            </div>
            <div class="form-group">
                <label>Invoice Date</label>
                <input type="date" id="invoiceDate">
            </div>
        </div>

        <div class="card">
            <h2>Items</h2>
            <div id="itemsList">
                <div class="row">
                    <input type="text" placeholder="Description" class="item-desc">
                    <input type="number" placeholder="Qty" class="item-qty" value="1" min="1">
                    <input type="number" placeholder="Price" class="item-price" min="0" step="0.01">
                    <button class="btn btn-remove" onclick="removeItem(this)">Remove</button>
                </div>
            </div>
            <button class="btn btn-add" onclick="addItem()">+ Add Item</button>
        </div>

        <button class="btn btn-generate" onclick="generateInvoice()">Generate Invoice</button>

        <div class="card invoice-preview" id="invoicePreview">
            <div id="invoiceContent"></div>
            <button class="btn share-btn" onclick="shareInvoice()">Share Invoice</button>
        </div>
    </div>

    <script>
        // Set today's date
        document.getElementById('invoiceDate').valueAsDate = new Date();

        function addItem() {
            const itemsList = document.getElementById('itemsList');
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="text" placeholder="Description" class="item-desc">
                <input type="number" placeholder="Qty" class="item-qty" value="1" min="1">
                <input type="number" placeholder="Price" class="item-price" min="0" step="0.01">
                <button class="btn btn-remove" onclick="removeItem(this)">Remove</button>
            `;
            itemsList.appendChild(row);
        }

        function removeItem(btn) {
            const rows = document.querySelectorAll('.row');
            if (rows.length > 1) {
                btn.parentElement.remove();
            }
        }

        function generateInvoice() {
            const businessName = document.getElementById('businessName').value || 'Your Business';
            const businessEmail = document.getElementById('businessEmail').value || '';
            const clientName = document.getElementById('clientName').value || 'Client';
            const invoiceDate = document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0];

            const rows = document.querySelectorAll('.row');
            let items = [];
            let subtotal = 0;

            rows.forEach(row => {
                const desc = row.querySelector('.item-desc').value;
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                
                if (desc && qty > 0 && price > 0) {
                    const total = qty * price;
                    subtotal += total;
                    items.push({ desc, qty, price, total });
                }
            });

            if (items.length === 0) {
                alert('Please add at least one item');
                return;
            }

            const tax = subtotal * 0.15;
            const grandTotal = subtotal + tax;

            let itemsHtml = '';
            items.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>${item.desc}</td>
                        <td>${item.qty}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td>$${item.total.toFixed(2)}</td>
                    </tr>
                `;
            });

            const invoiceHtml = `
                <div class="invoice-header">
                    <h2>INVOICE</h2>
                    <p style="color: #667eea; font-weight: bold;">${businessName}</p>
                    ${businessEmail ? `<p style="color: #888; font-size: 12px;">${businessEmail}</p>` : ''}
                </div>
                <div class="invoice-details">
                    <div>
                        <p><strong>Bill To:</strong></p>
                        <p>${clientName}</p>
                    </div>
                    <div style="text-align: right;">
                        <p><strong>Invoice Date:</strong></p>
                        <p>${invoiceDate}</p>
                        <p><strong>Invoice #:</strong></p>
                        <p>INV-${Date.now().toString().slice(-6)}</p>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${itemsHtml}
                    </tbody>
                </table>
                <div class="totals">
                    <p>Subtotal: $${subtotal.toFixed(2)}</p>
                    <p>Tax (15%): $${tax.toFixed(2)}</p>
                    <p class="grand-total">Total: $${grandTotal.toFixed(2)}</p>
                </div>
            `;

            document.getElementById('invoiceContent').innerHTML = invoiceHtml;
            document.getElementById('invoicePreview').classList.add('show');
            document.getElementById('invoicePreview').scrollIntoView({ behavior: 'smooth' });
        }

        function shareInvoice() {
            const businessName = document.getElementById('businessName').value || 'Your Business';
            const clientName = document.getElementById('clientName').value || 'Client';
            const invoiceDate = document.getElementById('invoiceDate').value;
            
            const shareText = `Invoice from ${businessName} to ${clientName} dated ${invoiceDate}. View the full invoice here.`;
            
            if (navigator.share) {
                navigator.share({
                    title: `Invoice - ${businessName}`,
                    text: shareText
                });
            } else {
                alert('Copy this message to share:\n\n' + shareText);
            }
        }
    </script>
</body>
</html>
